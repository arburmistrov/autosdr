name: Notion Opportunity Sync

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC-only, has no DST awareness, and can DELAY a run by hours.
    # We fire in both the summer (07:xx UTC = 09:xx CEST) and winter
    # (08:xx UTC = 09:xx CET) windows, each with a +30min backup so a dropped run
    # never loses the day. The guard below picks the right one by the DST offset
    # and WHICH cron fired — never by wall-clock, which GitHub's delays corrupt.
    - cron: '0 7 * * *'
    - cron: '30 7 * * *'
    - cron: '0 8 * * *'
    - cron: '30 8 * * *'

jobs:
  sync-opportunities:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PIPEDRIVE_DOMAIN: ${{ secrets.PIPEDRIVE_DOMAIN }}
      PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
      NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
      # The NOTION_DATABASE_ID *secret* points at a stale board with the wrong
      # schema (every run created 91 duplicate cards). The real Opportunities
      # board sales use is hardcoded here to override it. TODO(owner): fix the
      # NOTION_DATABASE_ID repo secret to this value, then restore the secret ref.
      NOTION_DATABASE_ID: "31280824014881f2a90ed3ff4955ee5f"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gate scheduled runs to the 09:00 Europe/Zurich crons
        # Manual runs (workflow_dispatch) always proceed. For scheduled runs we
        # gate on the DST offset + WHICH cron fired (github.event.schedule), NOT
        # the current hour — GitHub can run a scheduled job hours late, so a
        # wall-clock check skips the sync on the wrong day. In summer (CEST,
        # +0200) the 07:xx UTC crons are 09:xx local; in winter (CET, +0100) the
        # 08:xx UTC crons are 09:xx local. Either season fires ~09:00 + 09:30.
        if: github.event_name == 'schedule'
        run: |
          OFFSET=$(TZ=Europe/Zurich date +%z)
          SCHED="${{ github.event.schedule }}"
          echo "Zurich UTC offset: $OFFSET; triggering cron: '$SCHED'"
          RUN=false
          if [ "$OFFSET" = "+0200" ]; then
            case "$SCHED" in "0 7 * * *"|"30 7 * * *") RUN=true;; esac
          elif [ "$OFFSET" = "+0100" ]; then
            case "$SCHED" in "0 8 * * *"|"30 8 * * *") RUN=true;; esac
          fi
          if [ "$RUN" != "true" ]; then
            echo "Not a 09:00-Zurich cron for the current season — skipping."
            echo "SKIP_SYNC=true" >> "$GITHUB_ENV"
          fi

      - name: Setup Python
        if: env.SKIP_SYNC != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync
        if: env.SKIP_SYNC != 'true'
        run: |
          python scripts/sync_pipedrive_to_notion_opportunities.py --apply

      - name: Upload sync report
        if: env.SKIP_SYNC != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: notion-opportunity-sync-report
          path: data/output/notion_sync_report.json
          if-no-files-found: warn
