name: Temporary Audit Opportunity Stage 20260604T1215Z

on:
  push:
    branches:
      - main
    paths:
      - automation/tmp-audit-opportunity-stage-trigger.txt

jobs:
  audit-opportunity-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PIPEDRIVE_DOMAIN: ${{ secrets.PIPEDRIVE_DOMAIN }}
      PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
      NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
      NOTION_DATABASE_ID: "31280824014881f2a90ed3ff4955ee5f"
      PIPELINE_NAME: "S-PRO new"
      TARGET_STAGE: "Opportunity"
      APPLY_ARCHIVE: "true"

    steps:
      - name: Run audit and cleanup
        run: |
          mkdir -p data/output
          python - <<'PY'
          import json, os, urllib.request, urllib.parse, datetime as dt

          PD_DOMAIN = os.environ['PIPEDRIVE_DOMAIN'].strip()
          PD_TOKEN = os.environ['PIPEDRIVE_API_TOKEN'].strip()
          NOTION_TOKEN = os.environ['NOTION_API_TOKEN'].strip()
          DB_ID = os.environ['NOTION_DATABASE_ID'].strip()
          PIPELINE_NAME = os.environ['PIPELINE_NAME'].strip().lower()
          TARGET_STAGE = os.environ['TARGET_STAGE'].strip()
          APPLY_ARCHIVE = os.environ.get('APPLY_ARCHIVE', 'false').lower() == 'true'
          NOTION_VERSION = '2022-06-28'

          def pd_get(path, params=None):
            params = dict(params or {})
            params['api_token'] = PD_TOKEN
            url = f"https://{PD_DOMAIN}.pipedrive.com/api/v1{path}?" + urllib.parse.urlencode(params)
            with urllib.request.urlopen(url, timeout=60) as r:
              return json.load(r)

          def notion_request(method, path, payload=None):
            req = urllib.request.Request(
              f'https://api.notion.com{path}',
              method=method,
              headers={
                'Authorization': f'Bearer {NOTION_TOKEN}',
                'Notion-Version': NOTION_VERSION,
                'Content-Type': 'application/json',
              },
              data=(json.dumps(payload).encode('utf-8') if payload is not None else None),
            )
            with urllib.request.urlopen(req, timeout=60) as r:
              return json.load(r)

          pipelines = pd_get('/pipelines').get('data') or []
          pipeline_ids = {int(p['id']) for p in pipelines if str(p.get('name','')).strip().lower() == PIPELINE_NAME}
          stages = pd_get('/stages').get('data') or []
          stage_name_by_id = {int(s['id']): str(s.get('name') or '') for s in stages}

          deals = []
          start = 0
          while True:
            resp = pd_get('/deals', {'status':'open', 'start': start, 'limit': 500})
            batch = resp.get('data') or []
            deals.extend(batch)
            pag = resp.get('additional_data', {}).get('pagination', {})
            if not pag.get('more_items_in_collection'):
              break
            start = int(pag.get('next_start') or 0)

          crm_opportunity = []
          for d in deals:
            try:
              if int(d.get('pipeline_id') or 0) not in pipeline_ids:
                continue
              sid = int(d.get('stage_id') or 0)
              sname = stage_name_by_id.get(sid, '')
              if sname == TARGET_STAGE:
                crm_opportunity.append({
                  'deal_id': int(d['id']),
                  'title': d.get('title') or '',
                  'stage_name': sname,
                  'pipeline_id': int(d.get('pipeline_id') or 0),
                })
            except Exception:
              continue
          crm_ids = {row['deal_id'] for row in crm_opportunity}

          pages = []
          cursor = None
          while True:
            payload = {
              'filter': {
                'property': 'Stage',
                'select': {'equals': TARGET_STAGE}
              },
              'page_size': 100,
            }
            if cursor:
              payload['start_cursor'] = cursor
            resp = notion_request('POST', f'/v1/databases/{DB_ID}/query', payload)
            pages.extend(resp.get('results') or [])
            if not resp.get('has_more'):
              break
            cursor = resp.get('next_cursor')

          notion_rows = []
          for p in pages:
            props = p.get('properties', {})
            num = props.get('CRM Deal ID', {}).get('number')
            notion_rows.append({
              'page_id': p.get('id'),
              'url': p.get('url'),
              'name': ''.join(t.get('plain_text','') for t in props.get('Name', {}).get('title', [])),
              'crm_deal_id': int(num) if num is not None else None,
              'stage': props.get('Stage', {}).get('select', {}).get('name'),
            })

          stale = [row for row in notion_rows if row['crm_deal_id'] not in crm_ids]
          missing = [row for row in crm_opportunity if row['deal_id'] not in {n['crm_deal_id'] for n in notion_rows}]
          archived = []
          if APPLY_ARCHIVE:
            for row in stale:
              notion_request('PATCH', f"/v1/pages/{row['page_id']}", {'archived': True})
              archived.append(row)

          report = {
            'timestamp_utc': dt.datetime.utcnow().replace(microsecond=0).isoformat() + 'Z',
            'pipeline_name': PIPELINE_NAME,
            'target_stage': TARGET_STAGE,
            'crm_count': len(crm_opportunity),
            'notion_count_before': len(notion_rows),
            'stale_count': len(stale),
            'missing_count': len(missing),
            'archived_count': len(archived),
            'crm_opportunity': crm_opportunity,
            'notion_opportunity': notion_rows,
            'stale_notion_pages': stale,
            'missing_in_notion': missing,
          }
          with open('data/output/opportunity_stage_audit.json', 'w', encoding='utf-8') as f:
            json.dump(report, f, ensure_ascii=False, indent=2)
          print(json.dumps({
            'crm_count': len(crm_opportunity),
            'notion_count_before': len(notion_rows),
            'stale_count': len(stale),
            'missing_count': len(missing),
            'archived_count': len(archived),
          }))
          PY

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: tmp-opportunity-stage-audit-20260604T1215Z
          path: data/output/opportunity_stage_audit.json
          if-no-files-found: error
