name: Temporary Check LendMN 20260604T1605Z

on:
  push:
    branches:
      - main
    paths:
      - automation/tmp-check-lendmn-trigger.txt

jobs:
  check-lendmn:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PIPEDRIVE_DOMAIN: ${{ secrets.PIPEDRIVE_DOMAIN }}
      PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
      NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
      DEAL_ID: "21499"
      NOTION_PAGE_ID: "34b80824-0148-8177-8541-e83c3e5b158b"

    steps:
      - name: Check deal and optionally archive page
        run: |
          mkdir -p data/output
          python - <<'PY'
          import json, os, urllib.request, urllib.parse
          PD_DOMAIN = os.environ['PIPEDRIVE_DOMAIN'].strip()
          PD_TOKEN = os.environ['PIPEDRIVE_API_TOKEN'].strip()
          NOTION_TOKEN = os.environ['NOTION_API_TOKEN'].strip()
          DEAL_ID = os.environ['DEAL_ID'].strip()
          PAGE_ID = os.environ['NOTION_PAGE_ID'].strip()
          NOTION_VERSION = '2022-06-28'

          def pd_get(path, params=None):
            params = dict(params or {})
            params['api_token'] = PD_TOKEN
            url = f"https://{PD_DOMAIN}.pipedrive.com/api/v1{path}?" + urllib.parse.urlencode(params)
            with urllib.request.urlopen(url, timeout=60) as r:
              return json.load(r)

          def notion_patch(page_id, payload):
            req = urllib.request.Request(
              f'https://api.notion.com/v1/pages/{page_id}',
              method='PATCH',
              headers={
                'Authorization': f'Bearer {NOTION_TOKEN}',
                'Notion-Version': NOTION_VERSION,
                'Content-Type': 'application/json',
              },
              data=json.dumps(payload).encode('utf-8'),
            )
            with urllib.request.urlopen(req, timeout=60) as r:
              return json.load(r)

          deal_resp = pd_get(f'/deals/{DEAL_ID}')
          deal = deal_resp.get('data')
          result = {
            'deal_id': int(DEAL_ID),
            'exists_in_crm': bool(deal),
            'archived_notion': False,
            'crm': None,
          }
          if deal:
            result['crm'] = {
              'id': deal.get('id'),
              'title': deal.get('title'),
              'status': deal.get('status'),
              'deleted': deal.get('deleted'),
              'stage_id': deal.get('stage_id'),
              'pipeline_id': deal.get('pipeline_id'),
            }
          else:
            notion_patch(PAGE_ID, {'archived': True})
            result['archived_notion'] = True

          with open('data/output/lendmn_check.json', 'w', encoding='utf-8') as f:
            json.dump(result, f, ensure_ascii=False, indent=2)
          print(json.dumps(result))
          PY

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: tmp-check-lendmn-20260604T1605Z
          path: data/output/lendmn_check.json
          if-no-files-found: error
