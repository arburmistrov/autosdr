name: Temporary Normalized Stage Resync 20260604T1620Z

on:
  push:
    branches:
      - main
    paths:
      - automation/tmp-normalized-stage-resync-trigger.txt

jobs:
  normalized-stage-resync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PIPEDRIVE_DOMAIN: ${{ secrets.PIPEDRIVE_DOMAIN }}
      PIPEDRIVE_API_TOKEN: ${{ secrets.PIPEDRIVE_API_TOKEN }}
      NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
      NOTION_DATABASE_ID: "31280824014881f2a90ed3ff4955ee5f"
      MAX_DEALS: "200"
      PIPELINE_NAME: "S-PRO new"
      DEALS_STATUS: "open"
      CLEAR_BEFORE_SYNC: "false"
      SCAN_NOTES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Seed board from CRM
        run: |
          mkdir -p data/output
          set -o pipefail
          EXTRA_ARGS=""
          if [ "${SCAN_NOTES}" = "true" ]; then
            EXTRA_ARGS="--scan-notes"
          fi
          if [ "${CLEAR_BEFORE_SYNC}" = "true" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --clear-before-sync"
          fi
          python scripts/sync_pipedrive_to_notion_opportunities.py \
            --apply \
            --max-deals "${MAX_DEALS}" \
            --pipeline-name "${PIPELINE_NAME}" \
            --deals-status "${DEALS_STATUS}" \
            ${EXTRA_ARGS} 2>&1 | tee data/output/seed_board.log

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tmp-normalized-stage-resync-20260604T1620Z
          path: |
            data/output/seed_board.log
            data/output/notion_sync_report.json
          if-no-files-found: warn
