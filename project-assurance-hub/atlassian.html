<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Assurance Hub</title><style>body{margin:0;background:#f4f5f7;color:#172b4d;font:14px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:#fafbfc;border-right:1px solid #dfe1e6;padding:16px}.brand{display:flex;gap:10px;align-items:center;margin-bottom:18px}.mark{width:32px;height:32px;border-radius:3px;background:#0052cc;color:white;display:grid;place-items:center;font-weight:800}.brand b{display:block}.brand small,.eyebrow{color:#6b778c;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}.nav{display:grid;gap:2px;margin-bottom:22px}.nav button{border:0;border-radius:3px;background:transparent;color:#42526e;text-align:left;padding:9px 10px;cursor:pointer;font:inherit}.nav button.active{background:#deebff;color:#0747a6;font-weight:800}.sys{border-top:1px solid #dfe1e6;padding:14px 10px}.sys div{display:flex;justify-content:space-between;padding:7px 0}.work{padding:24px 28px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}h1{margin:0;font-size:28px}h2{margin:0 0 12px;font-size:22px}.pill{border-radius:3px;padding:3px 7px;font-size:11px;font-weight:900;text-transform:uppercase}.ok{color:#006644;background:#e3fcef}.warn{color:#974f0c;background:#fffae6}.bad{color:#bf2600;background:#ffebe6}.info{color:#0747a6;background:#deebff}.hero,.panel,.card,.item{background:white;border:1px solid #dfe1e6;border-radius:3px;box-shadow:0 1px 1px rgba(9,30,66,.13)}.hero{display:grid;grid-template-columns:1fr 140px;gap:16px;align-items:center;padding:18px;margin-bottom:12px}.score{aspect-ratio:1;border:10px solid #deebff;border-top-color:#0052cc;border-right-color:#ff991f;border-radius:50%;display:grid;place-items:center;text-align:center}.score b{font-size:34px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}.card{padding:14px}.card span,.item span,.fact span{color:#5e6c84;font-size:12px;font-weight:700}.card b{display:block;margin:7px 0;font-size:22px}.split{display:grid;grid-template-columns:360px 1fr;gap:12px}.panel{padding:16px}.head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px}.stack{display:grid;gap:6px}.item{width:100%;display:grid;gap:5px;padding:12px;text-align:left;cursor:pointer}.detail p{color:#42526e;line-height:1.55}.facts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.fact{background:#fafbfc;border:1px solid #dfe1e6;border-radius:3px;padding:12px}.fact b{display:block;margin-top:5px}.tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}.tags span{background:#ebecf0;border-radius:3px;padding:5px 8px;font-weight:800;font-size:12px}table{width:100%;border-collapse:collapse;border:1px solid #dfe1e6}td,th{padding:10px;border-bottom:1px solid #dfe1e6;text-align:left}th{background:#f4f5f7;color:#5e6c84;font-size:11px;text-transform:uppercase}.actions button{border:1px solid #c1c7d0;border-radius:3px;background:#f4f5f7;padding:8px 10px;font-weight:700;margin-right:8px}@media(max-width:900px){.app,.grid,.split,.hero{grid-template-columns:1fr}}</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="mark">PA</div><div><b>Project Assurance Hub</b><small>Ede & Ravenscroft</small></div></div><nav class="nav" id="nav"></nav><div class="sys"><small class="eyebrow">Monitored system</small><h3>E&R ERP Platform</h3><div><span>Tenure</span><b>15 years</b></div><div><span>Version</span><b>v12.8.4</b></div><div><span>Owner</span><b>Enterprise IT</b></div></div></aside><main class="work"><header class="top"><div><small class="eyebrow">Enterprise system assurance</small><h1>Ede & Ravenscroft ERP Platform</h1></div><span class="pill warn">Conditionally Ready</span></header><section id="content"></section></main></div><script>const tabNames=['Dashboard','Documentation','Decision Register','Test Reports','Feature Release','AI Optimization'],mods=[['Supplier Management','Procurement IT','Review','92%','18,420 records'],['Finance Export','Finance Systems','Degraded','81%','6 nightly files'],['User Permissions','Platform Operations','Action','86%','1,284 users'],['Inventory Control','Operations IT','Healthy','88%','284,910 movements']],docs=[['Product Overview','Functional','96%'],['Supplier Onboarding Workflow','Functional + Technical','84%'],['Finance Export Specification','Technical','72%'],['Role and Permission Matrix','Control','79%']],adrs=[['ADR-014','API adapter layer','Accepted'],['ADR-018','Event-driven inventory synchronization','Accepted'],['ADR-026','Finance export compatibility','Requires Review'],['ADR-031','Procurement approval owner role','Proposed']];function p(s){let c=s.includes('Healthy')||s.includes('Passed')||s.includes('Accepted')?'ok':s.includes('Degraded')||s.includes('Action')||s.includes('Critical')?'bad':s.includes('Review')||s.includes('Conditional')||s.includes('Proposed')?'warn':'info';return `<span class="pill ${c}">${s}</span>`}function setNav(a){document.getElementById('nav').innerHTML=tabNames.map(t=>`<button class="${t==a?'active':''}" onclick="show('${t}')">${t}</button>`).join('')}function facts(a){return `<div class="facts">${a.map(x=>`<div class="fact"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('')}</div>`}function tags(a){return `<div class="tags">${a.map(x=>`<span>${x}</span>`).join('')}</div>`}function rows(a,fn){return `<div class="stack">${a.map((x,i)=>`<button class="item" onclick="${fn}(${i})"><span>${x[1]}</span><b>${x[0]}</b><small>${x[2]}</small></button>`).join('')}</div>`}function show(t){setNav(t);if(t=='Dashboard')dash();if(t=='Documentation')doc();if(t=='Decision Register')adr();if(t=='Test Reports')tests();if(t=='Feature Release')rel();if(t=='AI Optimization')ai()}function dash(i=0){let m=mods[i];content.innerHTML=`<div class="hero"><div><small class="eyebrow">Release confidence</small><h2>Supplier Onboarding Form is ready for business review, with finance export and permissions still under validation.</h2></div><div class="score"><b>82</b><small>AI confidence</small></div></div><div class="grid"><div class="card"><span>System health</span><b>Stable with warnings</b></div><div class="card"><span>Latest test run</span><b>303 scenarios</b></div><div class="card"><span>Documentation</span><b>89%</b></div><div class="card"><span>Release readiness</span><b>Conditional</b></div></div><div class="split"><section class="panel"><div class="head"><h3>Business Modules</h3><span class="pill info">Click module</span></div>${rows(mods,'dash')}</section><section class="panel detail"><div class="head"><h2>${m[0]}</h2>${p(m[2])}</div><p>Operational module detail with synthetic ERP records, ownership, release coverage, and linked testing assets.</p>${facts([['Owner',m[1]],['Coverage',m[3]],['ERP data',m[4]]])}${tags(['Supplier Onboarding Form','Decision Register','Automated tests'])}</section></div>`}function doc(i=1){let d=docs[i];content.innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Documentation Library</h3><span class="pill info">12 sections</span></div>${rows(docs,'doc')}</section><section class="panel detail"><h2>${d[0]}</h2><p>Functional and technical context for AI-assisted validation, release review, and stakeholder traceability.</p>${facts([['Type',d[1]],['Completeness',d[2]],['Owner','ERP Product Office']])}${tags(['Workflow','Data entities','Operational controls','Release notes'])}</section></div>`}function adr(i=2){let a=adrs[i];content.innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Decision Register</h3><span class="pill warn">2 review items</span></div>${rows(adrs,'adr')}</section><section class="panel detail"><div class="head"><h2>${a[0]}: ${a[1]}</h2>${p(a[2])}</div><p>Decision context, consequences, linked modules, and testing impact are tracked here so every release has architectural traceability.</p>${facts([['Owner','Architecture Office'],['Status',a[2]],['Test impact','Regression coverage']])}</section></div>`}function tests(){content.innerHTML=`<div class="grid"><div class="card"><span>Total</span><b>303</b></div><div class="card"><span>Passed</span><b>284</b></div><div class="card"><span>Failed</span><b>7</b></div><div class="card"><span>Skipped</span><b>12</b></div></div><section class="panel"><h2>v12.8.4 Release Candidate</h2><table><tr><th>Suite</th><th>Passed</th><th>Failed</th><th>Status</th></tr><tr><td>Supplier Onboarding E2E</td><td>42</td><td>2</td><td>${p('Failing')}</td></tr><tr><td>Finance Export Contract</td><td>28</td><td>3</td><td>${p('Critical')}</td></tr><tr><td>ERP Smoke Suite</td><td>57</td><td>0</td><td>${p('Passed')}</td></tr></table></section>`}function rel(){content.innerHTML=`<section class="panel detail"><div class="head"><h2>Supplier Onboarding Form</h2>${p('Conditionally Ready')}</div><p>Reduces supplier setup time from 5 business days to 2 and gives finance earlier data validation.</p>${tags(['Supplier Management','Finance Export','User Permissions','Audit Logging'])}${facts([['Supplier drafts','42'],['Finance rows','312'],['Audit events','1,206']])}</section>`}function ai(){content.innerHTML=`<div class="split"><section class="panel"><h3>AI Work Queue</h3>${rows([['Add duplicate VAT negative path','High','Supplier Management'],['Update approval owner decision','High','Architecture'],['Document finance export fallback','Medium','Finance Export']],'ai')}</section><section class="panel detail"><h2>Add duplicate VAT negative path</h2><p>Current coverage validates missing tax ID, but not duplicate VAT across existing supplier records.</p>${tags(['Evidence','Suggested tests','Documentation update'])}<div class="actions"><button>Create Jira task</button><button>Generate tests</button><button>Update documentation</button></div></section></div>`}show('Dashboard')</script></body></html>
