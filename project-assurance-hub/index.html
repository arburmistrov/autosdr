<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Assurance Hub</title>
<style>
:root{--ink:#172b4d;--muted:#5e6c84;--page:#f4f5f7;--panel:#fff;--line:#dfe1e6;--blue:#0052cc;--blue2:#deebff;--green:#00875a;--green2:#e3fcef;--yellow:#ff991f;--yellow2:#fffae6;--red:#de350b;--red2:#ffebe6}*{box-sizing:border-box}body{margin:0;background:var(--page);color:var(--ink);font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;background:#fafbfc;border-right:1px solid var(--line);padding:16px}.brand{display:flex;gap:10px;align-items:center;margin-bottom:18px}.mark{width:32px;height:32px;border-radius:3px;background:var(--blue);color:white;display:grid;place-items:center;font-weight:800}.brand b{display:block}.small,.eyebrow{color:#6b778c;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}.nav{display:grid;gap:2px}.nav button,.btn{border:0;border-radius:3px;background:transparent;color:#42526e;text-align:left;padding:9px 10px;cursor:pointer;font:inherit}.nav button.active{background:var(--blue2);color:#0747a6;font-weight:800}.sys{border-top:1px solid var(--line);margin-top:20px;padding:14px 10px}.sys div{display:flex;justify-content:space-between;padding:7px 0}.work{padding:24px 28px 44px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}h1{margin:0;font-size:28px}h2{margin:0 0 12px;font-size:22px}h3{margin:0 0 10px;font-size:15px}.pill{display:inline-flex;align-items:center;min-height:22px;border-radius:3px;padding:2px 7px;font-size:11px;font-weight:900;text-transform:uppercase;white-space:nowrap}.ok{color:#006644;background:var(--green2)}.warn{color:#974f0c;background:var(--yellow2)}.bad{color:#bf2600;background:var(--red2)}.info{color:#0747a6;background:var(--blue2)}.hero,.panel,.card,.item,.doc,.scenario{background:white;border:1px solid var(--line);border-radius:3px;box-shadow:0 1px 1px rgba(9,30,66,.13)}.hero{display:grid;grid-template-columns:1fr 140px;gap:16px;align-items:center;padding:18px;margin-bottom:12px}.hero h2{max-width:920px}.score{aspect-ratio:1;border:10px solid var(--blue2);border-top-color:var(--blue);border-right-color:var(--yellow);border-radius:50%;display:grid;place-items:center;text-align:center}.score b{font-size:34px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:12px}.card{padding:14px;text-align:left;cursor:pointer}.card span,.item span,.fact span{color:var(--muted);font-size:12px;font-weight:700}.card b{display:block;margin:7px 0;font-size:22px}.split{display:grid;grid-template-columns:360px minmax(0,1fr);gap:12px}.two{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.panel{padding:16px}.head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px}.stack{display:grid;gap:6px}.item{width:100%;display:grid;gap:5px;padding:12px;text-align:left;cursor:pointer}.item:hover,.card:hover,.scenario:hover{border-color:#b3bac5;background:#fafbfc}.detail p{color:#42526e;line-height:1.55}.facts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.fact{background:#fafbfc;border:1px solid var(--line);border-radius:3px;padding:12px}.fact b{display:block;margin-top:5px}.tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}.tags span{background:#ebecf0;border-radius:3px;padding:5px 8px;font-weight:800;font-size:12px}.flow{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}.flow div{min-height:54px;display:grid;place-items:center;border:1px solid var(--line);background:#fafbfc;border-radius:3px;text-align:center;font-weight:800;padding:8px}table{width:100%;border-collapse:collapse;border:1px solid var(--line);background:white}td,th{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#f4f5f7;color:var(--muted);font-size:11px;text-transform:uppercase}.doc{padding:18px}.code{display:grid;gap:4px;background:#172b4d;color:#deebff;border-radius:3px;padding:12px;overflow:auto}.code code{white-space:pre;color:#deebff}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.actions button,.top button{border:1px solid #c1c7d0;border-radius:3px;background:#f4f5f7;padding:8px 10px;font-weight:700;color:#42526e;cursor:pointer}.scenario{display:grid;gap:6px;padding:12px;text-align:left}.modal{position:fixed;inset:0;background:rgba(9,30,66,.54);display:none;place-items:center;padding:24px}.modal.show{display:grid}.modalbox{width:min(820px,100%);max-height:90vh;overflow:auto;background:white;border-radius:3px;padding:22px;box-shadow:0 8px 16px rgba(9,30,66,.25)}.trace{border:1px solid var(--line);border-radius:3px;overflow:hidden;margin:14px 0}.trace div{display:grid;grid-template-columns:210px 1fr;gap:12px;padding:10px;border-bottom:1px solid var(--line)}.trace div:last-child{border-bottom:0}.trace .fail{background:var(--red2)}@media(max-width:1000px){.shell,.grid,.split,.two,.hero,.facts,.flow{grid-template-columns:1fr}.side{height:auto;position:relative}.nav{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body><div class="shell"><aside class="side"><div class="brand"><div class="mark">PA</div><div><b>Project Assurance Hub</b><span class="small">Ede & Ravenscroft</span></div></div><nav class="nav" id="nav"></nav><div class="sys"><span class="eyebrow">Monitored system</span><h3>E&R ERP Platform</h3><div><span>Tenure</span><b>15 years</b></div><div><span>Version</span><b>v12.8.4</b></div><div><span>Owner</span><b>Enterprise IT</b></div></div></aside><main class="work"><header class="top"><div><span class="eyebrow">Enterprise system assurance</span><h1>Ede & Ravenscroft ERP Platform</h1></div><div><span class="pill warn">Conditionally Ready</span> <button onclick="command()">Command</button></div></header><section id="app"></section></main></div><div class="modal" id="modal"><div class="modalbox" id="modalbox"></div></div>
<script>
const tabs=['Dashboard','Documentation','Architecture Decisions','Test Reports','Feature Release','AI Optimization'];
const modules=[['Supplier Management','Procurement IT','Review','92%','18,420 supplier records',['Supplier Draft','VAT Check','Approval Owner','Finance Export','Audit Event']],['Finance Export','Finance Systems','Degraded','81%','6 nightly export files',['Approved Supplier','Export Mapper','Fixed-width Batch','Finance ACK','Reconciliation']],['User Permissions','Platform Operations','Action','86%','1,284 active users',['Role Request','SoD Check','Permission Grant','Security Test','Quarterly Review']],['Inventory Control','Operations IT','Healthy','88%','284,910 stock movements',['Stock Event','Event Bus','Warehouse Sync','Retry Queue','Reconciliation']]];
const docs=[['Product Overview','Functional','96%','Business purpose, operating model, core capabilities, users, and domain map.'],['Supplier Onboarding Workflow','Functional + Technical','84%','Supplier creation, validation, approval routing, finance export, rejection handling, and audit requirements.'],['Finance Export Specification','Technical','72%','Fixed-width export layout, field mapping, nightly batch generation, acknowledgement handling, and reconciliation rules.'],['Role and Permission Matrix','Technical Control','79%','Business roles mapped to ERP permissions, approval actions, finance export visibility, and segregation of duties.']];
const adrs=[['ADR-014','Expose ERP capabilities through API adapter layer','Accepted'],['ADR-018','Use event-driven inventory synchronization','Accepted'],['ADR-026','Maintain finance export compatibility','Requires Review'],['ADR-031','Introduce procurement approval owner role','Proposed']];
const suites=[['Supplier Onboarding E2E',42,2,'Failing',['Create supplier with valid IBAN','Reject missing VAT ID','Block duplicate VAT number','Route to approval owner','Send approval notification']],['Finance Export Contract',28,3,'Critical',['Generate supplier export row','Validate fixed-width field lengths','Receive finance acknowledgement','Retry delayed acknowledgement']],['User Permissions Security',39,2,'Failing',['Approval owner can approve supplier','Approval owner cannot edit finance fields','Finance analyst can view export queue']],['ERP Smoke Suite',57,0,'Passed',['Login','Open dashboard','Search supplier','Open finance export queue']]];
const releases=[['v12.8.4','Supplier Onboarding Form','Conditionally Ready','Reduces supplier setup time from 5 business days to 2 and gives finance earlier data validation.'],['v12.8.3','VAT Validation Hotfix','Released','Improved tax validation resilience during supplier profile updates.'],['v12.8.2','Inventory Event Replay','Released','Added controlled replay for warehouse synchronization incidents.']];
function tone(s){return s.includes('Healthy')||s.includes('Passed')||s.includes('Accepted')||s.includes('Released')?'ok':s.includes('Critical')||s.includes('Degraded')||s.includes('Action')||s.includes('Failing')?'bad':s.includes('Review')||s.includes('Conditional')||s.includes('Proposed')?'warn':'info'}
function pill(s){return `<span class="pill ${tone(s)}">${s}</span>`}function facts(a){return `<div class="facts">${a.map(x=>`<div class="fact"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('')}</div>`}function tags(a){return `<div class="tags">${a.map(x=>`<span>${x}</span>`).join('')}</div>`}function flow(a){return `<div class="flow">${a.map(x=>`<div>${x}</div>`).join('')}</div>`}function list(a,fn){return `<div class="stack">${a.map((x,i)=>`<button class="item" onclick="${fn}(${i})"><span>${x[1]}</span><b>${x[0]}</b><small>${x[2]}</small></button>`).join('')}</div>`}
function setNav(a){nav.innerHTML=tabs.map(t=>`<button class="${t==a?'active':''}" onclick="show('${t}')">${t}</button>`).join('')}function show(t){setNav(t);if(t=='Dashboard')dash();if(t=='Documentation')doc();if(t=='Architecture Decisions')adr();if(t=='Test Reports')tests();if(t=='Feature Release')rel();if(t=='AI Optimization')ai()}
function dash(i=0){let m=modules[i];app.innerHTML=`<div class="hero"><div><span class="eyebrow">Release confidence</span><h2>Supplier Onboarding Form is ready for business review, with finance export and permissions still under validation.</h2></div><button class="score" onclick="show('Feature Release')"><b>82</b><small>AI confidence</small></button></div><div class="grid"><button class="card" onclick="dash(1)"><span>System health</span><b>Stable with warnings</b><p>3 monitored areas need attention</p></button><button class="card" onclick="show('Test Reports')"><span>Latest test run</span><b>303 scenarios</b><p>284 passed, 7 failed, 12 skipped</p></button><button class="card" onclick="show('Documentation')"><span>Documentation</span><b>89%</b><p>2 sections require review</p></button><button class="card" onclick="show('Feature Release')"><span>Release readiness</span><b>Conditional</b><p>Finance validation pending</p></button></div><div class="split"><section class="panel"><div class="head"><h3>Business Modules</h3><span class="pill info">Click module</span></div>${list(modules,'dash')}</section><section class="panel detail"><div class="head"><h2>${m[0]}</h2>${pill(m[2])}</div><p>Operational module detail with synthetic ERP records, ownership, release coverage, linked testing assets, and workflow traceability.</p>${facts([['Owner',m[1]],['Coverage',m[3]],['ERP data',m[4]]])}${flow(m[5])}${tags(['Supplier Onboarding Form','ADR impact','Automated test evidence','Audit records'])}</section></div>`}
function doc(i=1){let d=docs[i];app.innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Documentation Library</h3><span class="pill info">12 sections</span></div>${list(docs,'doc')}</section><section class="doc detail"><div class="head"><div><span class="eyebrow">${d[1]}</span><h2>${d[0]}</h2></div><span class="pill info">${d[2]} complete</span></div><p>${d[3]}</p>${facts([['Owner','ERP Product Office'],['AI readiness',d[2]=='96%'?'High':'Needs review'],['Last updated','24 Apr 2026']])}<div class="two"><section><h3>Functional workflow</h3><ol><li>Procurement manager creates supplier draft.</li><li>System validates VAT and payment details.</li><li>Approval owner reviews supplier profile.</li><li>Approved supplier is queued for finance export.</li><li>Audit event is written for each transition.</li></ol></section><section><h3>Configuration file</h3><div class="code"><code>supplier-onboarding.workflow.yaml</code><code>states: [draft, validation, approval, exported]</code><code>gate: finance-export-contract</code><code>audit: required</code></div></section></div>${tags(['Workflow','Data entities','Operational controls','Release notes','Test coverage'])}</section></div>`}
function adr(i=2){let a=adrs[i];app.innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Architecture Decision Records</h3><span class="pill warn">2 review items</span></div>${list(adrs,'adr')}</section><section class="doc detail"><div class="head"><div><span class="eyebrow">${a[0]}</span><h2>${a[1]}</h2></div>${pill(a[2])}</div><div class="two"><section><h3>Context</h3><p>The ERP platform needs controlled change without destabilizing finance, procurement, permissions, and audit flows.</p></section><section><h3>Decision</h3><p>Keep architectural changes explicit, linked to releases, and validated through automated regression evidence before approval.</p></section></div>${facts([['Owner','Architecture Office'],['Changed modules','Supplier, Finance, Permissions'],['Test impact','Regression gate']])}${tags(['Alternatives considered','Consequences','Linked docs','Release v12.8.4'])}</section></div>`}
function tests(){app.innerHTML=`<div class="grid"><div class="card"><span>Total</span><b>303</b></div><div class="card"><span>Passed</span><b>284</b></div><div class="card"><span>Failed</span><b>7</b></div><div class="card"><span>Skipped</span><b>12</b></div></div><div class="split"><section class="panel"><div class="head"><h3>Automated Test Runs</h3><span class="pill warn">Latest needs action</span></div><button class="item"><span>24 Apr 2026, 09:42</span><b>v12.8.4 Release Candidate</b><small>284/303 passed - 93.1% coverage</small></button><button class="item"><span>23 Apr 2026, 23:10</span><b>Nightly Regression</b><small>276/281 passed - 90.4% coverage</small></button></section><section class="panel"><h2>Scenario Evidence</h2><div class="two">${suites.map((s,i)=>`<button class="scenario" onclick="scenario(${i},0)"><span>${s[0]}</span><b>${s[1]} passed / ${s[2]} failed</b>${pill(s[3])}</button>`).join('')}</div><h3 style="margin-top:16px">Failed validations</h3><ul><li>FIN-EXPORT-014 delayed acknowledgement mismatch</li><li>PERM-023 approval owner can edit finance fields</li><li>SUP-ONB-008 duplicate VAT not rejected</li></ul></section></div>`}
function scenario(i,j){let s=suites[i], name=s[4][j]||s[4][0], failed=s[3]!='Passed'&&(name.includes('duplicate')||name.includes('acknowledgement')||name.includes('finance'));open(`<div class="head"><div><span class="eyebrow">${s[0]}</span><h2>${name}</h2></div>${pill(failed?'Failed':'Passed')}</div><div class="two"><section><h3>Scenario definition</h3><ul><li><b>Given</b> ERP staging contains supplier fixture SUP-${1000+i}</li><li><b>When</b> automation executes UI and adapter API workflow</li><li><b>Then</b> validation, audit, permissions, and export evidence must match expected state</li></ul></section><section>${facts([['Run ID','run-2026-04-24'],['Fixture','SUP-'+(1000+i)],['Browser','Chromium 124']])}</section></div><div class="trace"><div><b>Open ERP workspace</b><span>Navigation completed in 1.2s</span></div><div><b>Load fixture data</b><span>Supplier inserted into staging</span></div><div><b>Execute workflow</b><span>${name}</span></div><div class="${failed?'fail':''}"><b>Validate assertions</b><span>${failed?'Expected validation error, received status DRAFT':'All assertions passed'}</span></div><div><b>Attach evidence</b><span>DOM snapshot, API payload, audit event and export row captured</span></div></div><div class="code"><code>artifact: /evidence/run-2026-04-24/${name.replaceAll(' ','-')}/trace.zip</code><code>payload: financeBatch=FIN-20260424-02 auditEvent=AUD-1284-${i}</code></div>`) }
function rel(i=0){let r=releases[i];app.innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Feature Releases</h3><span class="pill info">Roadmap view</span></div>${list(releases,'rel')}</section><section class="doc detail"><div class="head"><div><span class="eyebrow">${r[0]}</span><h2>${r[1]}</h2></div>${pill(r[2])}</div><p>${r[3]}</p>${facts([['Supplier drafts','42'],['Finance rows','312'],['Audit events','1,206']])}<div class="two"><section><h3>Release package</h3><ul><li>Functional documentation updated</li><li>E2E scenarios generated</li><li>ADR impact mapped</li><li>Finance export validation pending</li><li>Permission regression pending</li></ul></section><section><h3>Config files</h3><div class="code"><code>supplier-onboarding.workflow.yaml</code><code>procurement-permissions.matrix.json</code><code>finance-export-mapping.v12.8.4.yml</code></div></section></div>${tags(['Supplier Management','Finance Export','User Permissions','Audit Logging'])}</section></div>`}
function ai(i=0){let items=[['Add duplicate VAT negative path','High','Supplier Management'],['Update approval owner ADR','High','Architecture'],['Document finance export fallback','Medium','Finance Export']];let it=items[i];app.innerHTML=`<div class="split"><section class="panel"><h3>AI Work Queue</h3>${list(items,'ai')}</section><section class="doc detail"><div class="head"><div><span class="eyebrow">${it[2]}</span><h2>${it[0]}</h2></div><span class="pill warn">${it[1]}</span></div><p>AI has identified a release assurance gap and can generate the connected task, tests, and documentation patch.</p>${tags(['SUP-ONB-008 failed','18,420 supplier records','Release v12.8.4'])}<div class="actions"><button onclick="open('<h2>Draft Jira task</h2><p>Project ERP-QA, assignee QA Automation, acceptance criteria generated and linked to release v12.8.4.</p>')">Create Jira task</button><button onclick="open('<h2>Generated tests</h2><ul><li>SUP-ONB-021 duplicate VAT blocks submission</li><li>SUP-ONB-022 supplier remains Draft</li><li>SUP-ONB-023 audit event captured</li></ul>')">Generate tests</button><button onclick="open('<h2>Documentation patch</h2><p>Supplier Onboarding Workflow gets duplicate VAT rule, validation copy, and finance export link.</p>')">Update documentation</button></div></section></div>`}
function command(){open('<h2>Command Center</h2><div class="actions"><button onclick="show(\'Test Reports\');closeM()">Open latest test run</button><button onclick="show(\'Feature Release\');closeM()">Review release package</button><button onclick="show(\'AI Optimization\');closeM()">Open AI work queue</button></div>')}
function open(html){modalbox.innerHTML='<button style="float:right" onclick="closeM()">Close</button>'+html+'<div class="actions"><button onclick="closeM()">Save draft</button><button onclick="closeM()">Copy link</button></div>';modal.classList.add('show')}function closeM(){modal.classList.remove('show')}modal.onclick=e=>{if(e.target.id=='modal')closeM()};show('Dashboard');
</script></body></html>
