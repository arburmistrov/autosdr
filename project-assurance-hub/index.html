<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Assurance Hub</title>
<style>
:root{--ink:#17211c;--muted:#607068;--paper:#f5f1e8;--panel:#fffdf8;--line:#ded7c8;--green:#20745a;--amber:#a86f16;--red:#b54036;--blue:#2f5f8f}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#eef3ef,#f5f1e8 42%,#ebe5d8);color:var(--ink);font-family:Avenir Next,Segoe UI,sans-serif}button{font:inherit}.app{display:grid;grid-template-columns:286px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:24px;border-right:1px solid var(--line);background:rgba(255,253,248,.88)}.brand{display:flex;gap:12px;align-items:center;padding-bottom:22px;border-bottom:1px solid var(--line)}.mark{width:44px;height:44px;border-radius:8px;display:grid;place-items:center;background:#17211c;color:#fff;font-weight:900}.brand p{margin:0;font-weight:900}.brand span,.eyebrow{color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase}.nav{display:grid;gap:7px;margin:26px 0}.nav button{border:0;border-radius:8px;padding:11px 12px;text-align:left;color:var(--muted);background:transparent;cursor:pointer}.nav button.active,.nav button:hover{background:#ebe5d8;color:var(--ink)}.sys{padding:16px;border:1px solid var(--line);border-radius:8px;background:var(--panel)}.sys strong{display:block;margin:8px 0 14px}.sys div{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding:8px 0}.work{padding:30px}.top{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:24px}h1{margin:0;font-family:Georgia,serif;font-size:clamp(30px,4vw,48px)}h2{font-size:clamp(24px,3vw,34px);line-height:1.12;margin:0 0 14px}h3,p{margin-top:0}.pill{display:inline-flex;min-height:26px;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;white-space:nowrap}.success{color:var(--green);background:#dcece5}.warning{color:var(--amber);background:#f5e8cf}.danger{color:var(--red);background:#f2d7d4}.neutral{color:var(--blue);background:#dfe9f1}.view{display:none}.view.active{display:block}.hero{display:grid;grid-template-columns:1fr 170px;gap:24px;align-items:center;padding:26px;margin-bottom:14px;border:1px solid var(--line);border-radius:8px;background:linear-gradient(135deg,#fffdf8,#e8efe8);box-shadow:0 18px 45px rgba(38,45,40,.12)}.gauge{aspect-ratio:1;border:12px solid #d7e7de;border-top-color:var(--green);border-right-color:var(--amber);border-radius:50%;display:grid;place-items:center;text-align:center;background:#fffdf8;cursor:pointer}.gauge b{display:block;font-size:42px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:14px}.panel,.card,.item{border:1px solid var(--line);border-radius:8px;background:rgba(255,253,248,.95);box-shadow:0 8px 28px rgba(38,45,40,.06)}.card{padding:18px;text-align:left;cursor:pointer}.card span,.item span,.fact span{color:var(--muted);font-size:13px}.card b{display:block;margin:8px 0;font-size:24px}.bar{height:8px;border-radius:999px;background:#e7e1d3;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--amber))}.split,.two{display:grid;grid-template-columns:360px 1fr;gap:14px}.two{grid-template-columns:1fr 1fr;margin-bottom:14px}.panel{padding:20px}.head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:16px}.stack{display:grid;gap:9px}.item{display:grid;gap:6px;width:100%;padding:14px;text-align:left;cursor:pointer;transition:.15s}.item:hover,.card:hover{transform:translateY(-1px);border-color:#b8ac97}.detail p{color:#3e4a44;line-height:1.58}.facts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.fact{padding:12px;border:1px solid var(--line);border-radius:8px;background:#f8f4eb}.fact b{display:block;margin-top:5px}.tags{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}.tags span{padding:7px 10px;border:1px solid var(--line);border-radius:999px;background:#f6f0e4;font-size:13px;font-weight:800}table{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fffdf8}td,th{padding:11px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#eee9dc;color:var(--muted);font-size:12px;text-transform:uppercase}.check label{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--line)}ul{margin:8px 0 0;padding-left:20px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}.actions button{border:1px solid var(--line);border-radius:8px;background:#fffdf8;padding:9px 12px}@media(max-width:1000px){.app,.split,.two,.hero,.grid{grid-template-columns:1fr}.side{position:relative;height:auto}.nav{grid-template-columns:repeat(3,1fr)}}@media(max-width:640px){.work,.side{padding:16px}.top,.head{align-items:flex-start;flex-direction:column}.nav,.facts{grid-template-columns:1fr}table{display:block;overflow-x:auto}}
</style>
</head>
<body>
<div class="app"><aside class="side"><div class="brand"><div class="mark">PA</div><div><p>Project Assurance Hub</p><span>Ede & Ravenscroft</span></div></div><nav class="nav" id="nav"></nav><div class="sys"><span class="eyebrow">Monitored system</span><strong>E&R ERP Platform</strong><div><span>Tenure</span><b>15 years</b></div><div><span>Version</span><b>v12.8.4</b></div><div><span>Owner</span><b>Enterprise IT</b></div></div></aside><main class="work"><header class="top"><div><span class="eyebrow">Enterprise system assurance</span><h1>Ede & Ravenscroft ERP Platform</h1></div><span class="pill warning">Conditionally Ready</span></header><section class="view active" id="dashboard"></section><section class="view" id="documentation"></section><section class="view" id="adr"></section><section class="view" id="tests"></section><section class="view" id="release"></section><section class="view" id="ai"></section></main></div>
<script>
const tabs=[['dashboard','Dashboard'],['documentation','Documentation'],['adr','Decision Register'],['tests','Test Reports'],['release','Feature Release'],['ai','AI Optimization']];
const modules=[{id:'supplier',name:'Supplier Management',status:'Review',owner:'Procurement IT',coverage:92,desc:'Maintains supplier master data, onboarding states, payment profiles, VAT checks, and approval routing.',facts:[['Pending onboarding','42'],['Approved this month','318'],['VAT validation failures','11']],links:['Supplier Onboarding Form','ADR-021','Supplier Onboarding E2E']},{id:'finance',name:'Finance Export',status:'Degraded',owner:'Finance Systems',coverage:81,desc:'Prepares approved supplier, invoice, payment, and reconciliation records for the finance platform.',facts:[['Last batch','FIN-20260424-02'],['Rejected rows','17'],['Delayed ACKs','3']],links:['ADR-026','Finance Export Contract','Rollback Plan']},{id:'permissions',name:'User Permissions',status:'Action',owner:'Platform Operations',coverage:86,desc:'Controls role-based access for procurement, finance, merchandising, customer service, and operations teams.',facts:[['Active users','1,284'],['Approval owners','58'],['Permission conflicts','2']],links:['ADR-031','Security Tests','Role Matrix']},{id:'inventory',name:'Inventory Control',status:'Healthy',owner:'Operations IT',coverage:88,desc:'Tracks stock positions, allocations, fulfilment events, returns, and warehouse synchronization.',facts:[['Events today','9,844'],['Retry queue','4'],['Out-of-sync SKUs','0']],links:['ADR-018','Inventory Sync Tests','Stock Workflow']}];
const docs=[{id:'overview',title:'Product Overview',type:'Functional',complete:96,summary:'Business purpose, operating model, core capabilities, users, and domain map for the E&R ERP Platform.',sections:['System purpose','Business capabilities','Primary user groups','Release governance'],gaps:['Add Q2 operating model changes after finance sign-off.']},{id:'supplier-doc',title:'Supplier Onboarding Workflow',type:'Functional + Technical',complete:84,summary:'Defines supplier creation, validation, approval routing, finance export, rejection handling, and audit requirements.',sections:['Create supplier','Validate tax ID','Assign approval owner','Export to finance','Reject supplier'],gaps:['Document duplicate VAT behavior.','Clarify rejected payment fallback.']},{id:'finance-doc',title:'Finance Export Specification',type:'Technical',complete:72,summary:'Covers fixed-width export layout, field mapping, nightly batch generation, acknowledgement handling, and reconciliation rules.',sections:['Export schema','Batch lifecycle','Acknowledgement protocol','Error handling'],gaps:['Add delayed acknowledgement retry rules.','Update sample file for supplier onboarding fields.']},{id:'roles-doc',title:'Role and Permission Matrix',type:'Control',complete:79,summary:'Maps business roles to ERP permissions, approval actions, finance export visibility, and segregation of duties constraints.',sections:['Role catalog','Approval permissions','Finance visibility','Security exceptions'],gaps:['Add procurement approval owner role introduced in v12.8.4.']}];
const adrs=[{id:'ADR-014',title:'Expose ERP capabilities through API adapter layer',status:'Accepted',owner:'Architecture Office',date:'2024-11-18',decision:'Keep the ERP core stable while exposing selected workflows through a governed API adapter layer.',impact:['Adapter contracts required','API contract validation in every release']},{id:'ADR-018',title:'Use event-driven inventory synchronization',status:'Accepted',owner:'Integration Lead',date:'2025-02-07',decision:'Inventory updates are emitted as durable events and retried idempotently until downstream confirmation.',impact:['Replay-safe event handlers','Retry and idempotency tests']},{id:'ADR-026',title:'Maintain finance export compatibility',status:'Requires Review',owner:'Finance Systems',date:'2025-09-22',decision:'Finance exports remain compatible with the approved fixed-width batch format until the finance platform migration is complete.',impact:['Supplier fields must fit field lengths','Export failures block approval']},{id:'ADR-031',title:'Introduce procurement approval owner role',status:'Proposed',owner:'Platform Operations',date:'2026-04-22',decision:'Create a dedicated approval owner role for supplier onboarding to improve routing and accountability.',impact:['Permission matrix update','Security regression coverage']}];
const runs=[{id:'run1',title:'v12.8.4 Release Candidate',time:'24 Apr 2026, 09:42',status:'Action needed',total:303,passed:284,failed:7,skipped:12,suites:[['Supplier Onboarding E2E',42,2,0,'94%','Failing'],['Purchase Order Approval Regression',67,0,3,'91%','Passed'],['Inventory Sync Integration',51,0,4,'88%','Passed'],['Finance Export Contract',28,3,2,'81%','Critical'],['User Permissions Security',39,2,1,'86%','Failing']],failures:['FIN-EXPORT-014 delayed acknowledgement mismatch','PERM-023 approval owner can edit finance fields','SUP-ONB-008 duplicate VAT not rejected']},{id:'run2',title:'Nightly Regression',time:'23 Apr 2026, 23:10',status:'Passed',total:281,passed:276,failed:0,skipped:5,suites:[['ERP Smoke Suite',58,0,1,'96%','Passed'],['Purchase Order Approval Regression',68,0,2,'91%','Passed'],['Inventory Sync Integration',50,0,2,'88%','Passed']],failures:['No active failures in this run.']}];
const releases=[{id:'rel1',version:'v12.8.4',title:'Supplier Onboarding Form',status:'Conditionally Ready',owner:'Procurement Transformation',value:'Reduces supplier setup time from 5 business days to 2 and gives finance earlier data validation.',impact:['Supplier Management','Procurement Approvals','Finance Export','User Permissions','Audit Logging'],facts:[['Supplier drafts','42'],['Approval owners assigned','38'],['Finance rows generated','312'],['Audit events','1,206']],checks:[['Functional documentation updated',1],['E2E scenarios generated',1],['ADR impact mapped',1],['Finance export validation passed',0],['Permission regression cleared',0],['Rollback plan reviewed',1]]},{id:'rel2',version:'v12.8.3',title:'VAT Validation Hotfix',status:'Released',owner:'Procurement IT',value:'Improved tax validation resilience during supplier profile updates.',impact:['Supplier Management','Tax Validation Gateway'],facts:[['VAT checks today','2,914'],['Validation retries','18'],['Failed lookups','0']],checks:[['Regression passed',1],['Production monitoring clean',1],['Documentation updated',1]]}];
const ai=[{id:'ai1',title:'Add duplicate VAT negative path',priority:'High',area:'Supplier Management',summary:'Current coverage validates missing tax ID, but not duplicate VAT across existing supplier records.',evidence:['SUP-ONB-008 failed','18,420 supplier records','11 VAT validation failures today'],next:['Generate E2E scenario','Add fixture with existing VAT','Link to workflow documentation']},{id:'ai2',title:'Update approval owner decision',priority:'High',area:'Architecture',summary:'ADR-031 is still proposed while the feature release depends on new procurement approval permissions.',evidence:['Permission matrix changed by 9 rows','2 security tests failing','Release v12.8.4 conditionally ready'],next:['Finalize decision status','Add consequences','Map required permission tests']},{id:'ai3',title:'Document finance export fallback',priority:'Medium',area:'Finance Export',summary:'The export specification does not describe delayed acknowledgement retry behavior for supplier records.',evidence:['FIN-EXPORT-014 failed','3 delayed acknowledgements','ADR-026 requires review'],next:['Update export specification','Add connector retry test','Attach sample failed batch']}];
function cls(s){s=s.toLowerCase();return s.includes('healthy')||s.includes('passed')||s.includes('accepted')||s.includes('released')?'success':s.includes('critical')||s.includes('degraded')||s.includes('action')?'danger':s.includes('review')||s.includes('conditional')||s.includes('warning')||s.includes('proposed')?'warning':'neutral'}function pill(s){return `<span class="pill ${cls(s)}">${s}</span>`}function facts(a){return `<div class="facts">${a.map(x=>`<div class="fact"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('')}</div>`}function tags(t,a){return `<h3>${t}</h3><div class="tags">${a.map(x=>`<span>${x}</span>`).join('')}</div>`}function list(t,a){return `<h3>${t}</h3><ul>${a.map(x=>`<li>${x}</li>`).join('')}</ul>`}function table(rows){return `<table><thead><tr><th>Suite</th><th>Passed</th><th>Failed</th><th>Skipped</th><th>Coverage</th><th>Status</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${pill(r[5])}</td></tr>`).join('')}</tbody></table>`}
function nav(active='dashboard'){document.getElementById('nav').innerHTML=tabs.map(t=>`<button class="${t[0]===active?'active':''}" onclick="show('${t[0]}')">${t[1]}</button>`).join('');document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===active));}
function show(id){nav(id); if(id==='dashboard')dash(); if(id==='documentation')docsView(); if(id==='adr')adrView(); if(id==='tests')testsView(); if(id==='release')releaseView(); if(id==='ai')aiView(); scrollTo({top:0,behavior:'smooth'});}
function dash(m=modules[0],i=0){nav('dashboard');document.getElementById('dashboard').innerHTML=`<div class="hero"><div><span class="eyebrow">Release confidence</span><h2>Supplier Onboarding Form is ready for business review, with finance export and permissions still under validation.</h2></div><button class="gauge" onclick="releaseView(releases[0])"><div><b>82</b><small>AI confidence score</small></div></button></div><div class="grid">${[['System health','Stable with warnings','3 monitored areas need attention',78],['Latest test run','303 scenarios','284 passed, 7 failed, 12 skipped',94],['Documentation','89%','2 sections require review',89],['Release readiness','Conditional','Finance export validation pending',82]].map(x=>`<button class="card"><span>${x[0]}</span><b>${x[1]}</b><p>${x[2]}</p><div class="bar"><i style="width:${x[3]}%"></i></div></button>`).join('')}</div><div class="split"><section class="panel"><div class="head"><h3>Business Modules</h3><span class="pill neutral">Click module</span></div><div class="stack">${modules.map(x=>`<button class="item" onclick="dash(modules.find(m=>m.id==='${x.id}'))"><span>${x.owner}</span><b>${x.name}</b><small>${x.coverage}% coverage · ${x.status}</small></button>`).join('')}</div></section><section class="panel detail"><div class="head"><div><span class="eyebrow">Module detail</span><h2>${m.name}</h2></div>${pill(m.status)}</div><p>${m.desc}</p>${facts([['Owner',m.owner],['Coverage',m.coverage+'%'],['Status',m.status]])}${facts(m.facts)}${tags('Linked assets',m.links)}</section></div>`}
function docsView(d=docs[1]){nav('documentation');document.getElementById('documentation').innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Documentation Library</h3><span class="pill neutral">12 sections</span></div><div class="stack">${docs.map(x=>`<button class="item" onclick="docsView(docs.find(d=>d.id==='${x.id}'))"><span>${x.type}</span><b>${x.title}</b><small>${x.complete}% complete</small></button>`).join('')}</div></section><section class="panel detail"><div class="head"><div><span class="eyebrow">${d.type}</span><h2>${d.title}</h2></div><span class="pill neutral">${d.complete}% complete</span></div><p>${d.summary}</p>${tags('Sections',d.sections)}${list('Documentation gaps',d.gaps)}</section></div>`}
function adrView(a=adrs[2]){nav('adr');document.getElementById('adr').innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Decision Register</h3><span class="pill warning">2 review items</span></div><div class="stack">${adrs.map(x=>`<button class="item" onclick="adrView(adrs.find(a=>a.id==='${x.id}'))"><span>${x.id} · ${x.date}</span><b>${x.title}</b><small>${x.status} · ${x.owner}</small></button>`).join('')}</div></section><section class="panel detail"><div class="head"><div><span class="eyebrow">${a.id}</span><h2>${a.title}</h2></div>${pill(a.status)}</div><p>${a.decision}</p>${facts([['Owner',a.owner],['Date',a.date],['Status',a.status]])}${list('Consequences',a.impact)}</section></div>`}
function testsView(r=runs[0]){nav('tests');document.getElementById('tests').innerHTML=`<div class="grid">${[['Total tests',r.total,'Across active suites'],['Passed',r.passed,'Execution pass count'],['Failed',r.failed,'Needs triage'],['Skipped',r.skipped,'Fixture or environment gap']].map(x=>`<div class="card"><span>${x[0]}</span><b>${x[1]}</b><p>${x[2]}</p></div>`).join('')}</div><div class="split"><section class="panel"><div class="head"><h3>Automated Test Runs</h3><span class="pill warning">Latest needs action</span></div><div class="stack">${runs.map(x=>`<button class="item" onclick="testsView(runs.find(r=>r.id==='${x.id}'))"><span>${x.time}</span><b>${x.title}</b><small>${x.passed}/${x.total} passed · ${x.status}</small></button>`).join('')}</div></section><section class="panel detail"><div class="head"><div><span class="eyebrow">${r.time}</span><h2>${r.title}</h2></div>${pill(r.status)}</div>${facts([['Total',r.total],['Passed',r.passed],['Failed',r.failed],['Skipped',r.skipped]])}${table(r.suites)}${list('Failed validations',r.failures)}</section></div>`}
function releaseView(r=releases[0]){nav('release');document.getElementById('release').innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Feature Releases</h3><span class="pill neutral">Roadmap view</span></div><div class="stack">${releases.map(x=>`<button class="item" onclick="releaseView(releases.find(r=>r.id==='${x.id}'))"><span>${x.version}</span><b>${x.title}</b><small>${x.status} · ${x.owner}</small></button>`).join('')}</div></section><section class="panel detail"><div class="head"><div><span class="eyebrow">${r.version}</span><h2>${r.title}</h2></div>${pill(r.status)}</div><p>${r.value}</p>${tags('Impacted modules',r.impact)}${facts(r.facts)}<div class="check">${r.checks.map(c=>`<label><input type="checkbox" ${c[1]?'checked':''}> ${c[0]}</label>`).join('')}</div></section></div>`}
function aiView(a=ai[0]){nav('ai');document.getElementById('ai').innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>AI Work Queue</h3><span class="pill neutral">Prioritized</span></div><div class="stack">${ai.map(x=>`<button class="item" onclick="aiView(ai.find(a=>a.id==='${x.id}'))"><span>${x.priority} priority · ${x.area}</span><b>${x.title}</b><small>${x.summary}</small></button>`).join('')}</div></section><section class="panel detail"><div class="head"><div><span class="eyebrow">${a.area}</span><h2>${a.title}</h2></div><span class="pill ${a.priority==='High'?'warning':'neutral'}">${a.priority}</span></div><p>${a.summary}</p>${tags('Evidence',a.evidence)}${list('Suggested next steps',a.next)}<div class="actions"><button>Create Jira task</button><button>Generate tests</button><button>Update documentation</button></div></section></div>`}
nav();dash();
</script>
</body>
</html>
