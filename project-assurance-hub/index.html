<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Assurance Hub</title><style>:root{--ink:#172b4d;--muted:#5e6c84;--page:#f4f5f7;--panel:#fff;--nav:#fafbfc;--line:#dfe1e6;--blue:#0052cc;--blue2:#deebff;--green:#00875a;--green2:#e3fcef;--yellow:#ff991f;--yellow2:#fffae6;--red:#de350b;--red2:#ffebe6}*{box-sizing:border-box}body{margin:0;background:var(--page);color:var(--ink);font:14px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;background:var(--nav);border-right:1px solid var(--line);padding:16px}.brand{display:flex;gap:10px;align-items:center;margin-bottom:18px}.mark{width:32px;height:32px;border-radius:3px;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:800}.brand b{display:block}.brand small,.eyebrow{color:#6b778c;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}.nav{display:grid;gap:2px;margin-bottom:22px}.nav button{border:0;border-radius:3px;background:transparent;color:#42526e;text-align:left;padding:9px 10px;cursor:pointer;font:inherit}.nav button:hover{background:#ebecf0}.nav button.active{background:var(--blue2);color:#0747a6;font-weight:800}.sys{border-top:1px solid var(--line);padding:14px 10px}.sys strong{display:block;margin:8px 0 12px}.sys div{display:flex;justify-content:space-between;padding:7px 0;color:#42526e}.work{padding:24px 28px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}h1{margin:0;font-size:28px}h2{margin:0 0 12px;font-size:22px;line-height:1.25}h3{margin:0;font-size:15px}.pill{display:inline-flex;border-radius:3px;padding:3px 7px;font-size:11px;font-weight:900;text-transform:uppercase}.success{color:#006644;background:var(--green2)}.warning{color:#974f0c;background:var(--yellow2)}.danger{color:#bf2600;background:var(--red2)}.neutral{color:#0747a6;background:var(--blue2)}.view{display:none}.view.active{display:block}.hero,.panel,.card,.item{background:var(--panel);border:1px solid var(--line);border-radius:3px;box-shadow:0 1px 1px rgba(9,30,66,.13),0 0 1px rgba(9,30,66,.31)}.hero{display:grid;grid-template-columns:1fr 142px;gap:16px;align-items:center;padding:18px;margin-bottom:12px}.gauge{aspect-ratio:1;border:10px solid var(--blue2);border-top-color:var(--blue);border-right-color:var(--yellow);border-radius:50%;display:grid;place-items:center;background:#fff;cursor:pointer}.gauge b{font-size:34px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}.card{padding:14px;text-align:left;cursor:pointer}.card span,.item span,.fact span{color:var(--muted);font-size:12px;font-weight:700}.card b{display:block;margin:7px 0;font-size:22px}.bar{height:6px;border-radius:999px;background:#ebecf0;overflow:hidden}.bar i{display:block;height:100%;background:var(--blue)}.split{display:grid;grid-template-columns:360px 1fr;gap:12px}.panel{padding:16px}.head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px}.stack{display:grid;gap:6px}.item{width:100%;display:grid;gap:5px;padding:12px;text-align:left;cursor:pointer}.item:hover,.card:hover{background:#fafbfc;border-color:#b3bac5}.detail p{color:#42526e;line-height:1.55}.facts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.fact{background:#fafbfc;border:1px solid var(--line);border-radius:3px;padding:12px}.fact b{display:block;margin-top:5px}.tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}.tags span{background:#ebecf0;border-radius:3px;padding:5px 8px;font-weight:800;font-size:12px}table{width:100%;border-collapse:collapse;border:1px solid var(--line)}td,th{padding:10px;border-bottom:1px solid var(--line);text-align:left}th{background:#f4f5f7;color:var(--muted);font-size:11px;text-transform:uppercase}.check label{display:flex;gap:8px;padding:8px 0;border-top:1px solid var(--line)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.actions button{border:1px solid #c1c7d0;border-radius:3px;background:#f4f5f7;padding:8px 10px;font-weight:700}@media(max-width:900px){.app,.grid,.split,.hero{grid-template-columns:1fr}.side{position:relative;height:auto}.nav{grid-template-columns:repeat(3,1fr)}}@media(max-width:600px){.work,.side{padding:14px}.top,.head{align-items:flex-start;flex-direction:column}.facts{grid-template-columns:1fr}table{display:block;overflow:auto}}</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="mark">PA</div><div><b>Project Assurance Hub</b><small>Ede & Ravenscroft</small></div></div><nav class="nav" id="nav"></nav><div class="sys"><small class="eyebrow">Monitored system</small><strong>E&R ERP Platform</strong><div><span>Tenure</span><b>15 years</b></div><div><span>Version</span><b>v12.8.4</b></div><div><span>Owner</span><b>Enterprise IT</b></div></div></aside><main class="work"><header class="top"><div><small class="eyebrow">Enterprise system assurance</small><h1>Ede & Ravenscroft ERP Platform</h1></div><span class="pill warning">Conditionally Ready</span></header><section class="view active" id="dashboard"></section><section class="view" id="documentation"></section><section class="view" id="adr"></section><section class="view" id="tests"></section><section class="view" id="release"></section><section class="view" id="ai"></section></main></div><script>const tabs=[['dashboard','Dashboard'],['documentation','Documentation'],['adr','Decision Register'],['tests','Test Reports'],['release','Feature Release'],['ai','AI Optimization']];const modules=[['Supplier Management','Procurement IT','Review','92%','18,420 supplier records','Maintains supplier master data, onboarding states, payment profiles, VAT checks, and approval routing.'],['Finance Export','Finance Systems','Degraded','81%','6 nightly export files','Prepares supplier, invoice, payment, and reconciliation records for the finance platform.'],['User Permissions','Platform Operations','Action','86%','1,284 active users','Controls role-based access for procurement, finance, customer service, and operations teams.'],['Inventory Control','Operations IT','Healthy','88%','284,910 stock movements','Tracks stock positions, allocations, fulfilment events, returns, and warehouse synchronization.']];const docs=[['Product Overview','Functional','96%','Business purpose, operating model, core capabilities, users, and domain map.'],['Supplier Onboarding Workflow','Functional + Technical','84%','Supplier creation, validation, approval routing, finance export, rejection handling, and audit requirements.'],['Finance Export Specification','Technical','72%','Fixed-width export layout, field mapping, batch generation, acknowledgement handling, and reconciliation.'],['Role and Permission Matrix','Control','79%','Business roles, ERP permissions, approval actions, finance visibility, and segregation of duties.']];const adrs=[['ADR-014','Expose ERP capabilities through API adapter layer','Accepted','Architecture Office','Adapter contract tests'],['ADR-018','Use event-driven inventory synchronization','Accepted','Integration Lead','Retry and idempotency tests'],['ADR-026','Maintain finance export compatibility','Requires Review','Finance Systems','Critical export regression'],['ADR-031','Introduce procurement approval owner role','Proposed','Platform Operations','Permission matrix coverage']];const runs=[['v12.8.4 Release Candidate','Action needed','303','284','7','12'],['Nightly Regression','Passed','281','276','0','5']];const rels=[['v12.8.4','Supplier Onboarding Form','Conditionally Ready','Procurement Transformation','Reduces supplier setup time from 5 business days to 2 and gives finance earlier data validation.'],['v12.8.3','VAT Validation Hotfix','Released','Procurement IT','Improved tax validation resilience during supplier profile updates.']];const ai=[['Add duplicate VAT negative path','High','Supplier Management','Current coverage validates missing tax ID, but not duplicate VAT across existing supplier records.'],['Update approval owner decision','High','Architecture','ADR-031 is still proposed while the feature release depends on new procurement approval permissions.'],['Document finance export fallback','Medium','Finance Export','The export specification does not describe delayed acknowledgement retry behavior.']];function cls(s){s=s.toLowerCase();return s.includes('healthy')||s.includes('passed')||s.includes('accepted')||s.includes('released')?'success':s.includes('critical')||s.includes('degraded')||s.includes('action')?'danger':s.includes('review')||s.includes('conditional')||s.includes('proposed')?'warning':'neutral'}function pill(s){return `<span class="pill ${cls(s)}">${s}</span>`}function nav(active){document.getElementById('nav').innerHTML=tabs.map(t=>`<button class="${t[0]===active?'active':''}" onclick="show('${t[0]}')">${t[1]}</button>`).join('');document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===active))}function facts(a){return `<div class="facts">${a.map(x=>`<div class="fact"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('')}</div>`}function tags(a){return `<div class="tags">${a.map(x=>`<span>${x}</span>`).join('')}</div>`}function stack(arr,fn){return `<div class="stack">${arr.map((x,i)=>`<button class="item" onclick="${fn}(${i})"><span>${x[1]||x[0]}</span><b>${x[0]}</b><small>${x[2]||''}</small></button>`).join('')}</div>`}function show(id){nav(id);({dashboard:dash,documentation:doc,adr:adr,tests:tests,release:release,ai:aiView}[id])();scrollTo({top:0,behavior:'smooth'})}function dash(i=0){nav('dashboard');let m=modules[i];dashboard.innerHTML=`<div class="hero"><div><small class="eyebrow">Release confidence</small><h2>Supplier Onboarding Form is ready for business review, with finance export and permissions still under validation.</h2></div><button class="gauge" onclick="release(0)"><b>82</b><small>AI confidence</small></button></div><div class="grid">${[['System health','Stable with warnings','3 monitored areas need attention',78],['Latest test run','303 scenarios','284 passed, 7 failed, 12 skipped',94],['Documentation','89%','2 sections require review',89],['Release readiness','Conditional','Finance export validation pending',82]].map(x=>`<button class="card"><span>${x[0]}</span><b>${x[1]}</b><p>${x[2]}</p><div class="bar"><i style="width:${x[3]}%"></i></div></button>`).join('')}</div><div class="split"><section class="panel"><div class="head"><h3>Business Modules</h3><span class="pill neutral">Click module</span></div>${stack(modules,'dash')}</section><section class="panel detail"><div class="head"><div><small class="eyebrow">Module detail</small><h2>${m[0]}</h2></div>${pill(m[2])}</div><p>${m[5]}</p>${facts([['Owner',m[1]],['Coverage',m[3]],['ERP data',m[4]]])}${tags(['Supplier Onboarding Form','Decision Register','Automated tests'])}</section></div>`}function doc(i=1){nav('documentation');let d=docs[i];documentation.innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Documentation Library</h3><span class="pill neutral">12 sections</span></div>${stack(docs,'doc')}</section><section class="panel detail"><div class="head"><div><small class="eyebrow">${d[1]}</small><h2>${d[0]}</h2></div><span class="pill neutral">${d[2]} complete</span></div><p>${d[3]}</p>${tags(['Workflow','Data entities','Operational controls','Release notes'])}<h3>Documentation gaps</h3><ul><li>Clarify rejected payment fallback.</li><li>Add example export batch.</li></ul></section></div>`}function adr(i=2){nav('adr');let a=adrs[i];adr.innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Decision Register</h3><span class="pill warning">2 review items</span></div>${stack(adrs,'adr')}</section><section class="panel detail"><div class="head"><div><small class="eyebrow">${a[0]}</small><h2>${a[1]}</h2></div>${pill(a[2])}</div><p>Decision context, consequences, linked modules, and testing impact are tracked here so every release has architectural traceability.</p>${facts([['Owner',a[3]],['Status',a[2]],['Test impact',a[4]]])}</section></div>`}function tests(i=0){nav('tests');let r=runs[i];tests.innerHTML=`<div class="grid">${[['Total',r[2]],['Passed',r[3]],['Failed',r[4]],['Skipped',r[5]]].map(x=>`<div class="card"><span>${x[0]}</span><b>${x[1]}</b></div>`).join('')}</div><div class="split"><section class="panel"><div class="head"><h3>Automated Test Runs</h3>${pill(r[1])}</div>${stack(runs,'tests')}</section><section class="panel detail"><h2>${r[0]}</h2><table><tr><th>Suite</th><th>Passed</th><th>Failed</th><th>Status</th></tr><tr><td>Supplier Onboarding E2E</td><td>42</td><td>2</td><td>${pill('Failing')}</td></tr><tr><td>Finance Export Contract</td><td>28</td><td>3</td><td>${pill('Critical')}</td></tr><tr><td>ERP Smoke Suite</td><td>57</td><td>0</td><td>${pill('Passed')}</td></tr></table></section></div>`}function release(i=0){nav('release');let r=rels[i];release.innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>Feature Releases</h3><span class="pill neutral">Roadmap</span></div>${stack(rels,'release')}</section><section class="panel detail"><div class="head"><div><small class="eyebrow">${r[0]}</small><h2>${r[1]}</h2></div>${pill(r[2])}</div><p>${r[4]}</p>${tags(['Supplier Management','Finance Export','User Permissions','Audit Logging'])}<div class="check"><label><input checked type="checkbox"> Functional documentation updated</label><label><input checked type="checkbox"> E2E scenarios generated</label><label><input type="checkbox"> Finance export validation passed</label></div></section></div>`}function aiView(i=0){nav('ai');let a=ai[i];ai.innerHTML=`<div class="split"><section class="panel"><div class="head"><h3>AI Work Queue</h3><span class="pill neutral">Prioritized</span></div>${stack(ai,'aiView')}</section><section class="panel detail"><div class="head"><div><small class="eyebrow">${a[2]}</small><h2>${a[0]}</h2></div><span class="pill warning">${a[1]}</span></div><p>${a[3]}</p>${tags(['Evidence','Suggested tests','Documentation update'])}<div class="actions"><button>Create Jira task</button><button>Generate tests</button><button>Update documentation</button></div></section></div>`}show('dashboard');</script></body></html>
